<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="256" height="256" shape-rendering="crispEdges">
  <style>
    rect { width: 1px; height: 1px; }
  </style>
  <!-- Background -->
  <rect x="0" y="0" width="16" height="16" fill="#E0E7FF"/>

  <!-- Antenna -->
  <rect x="7" y="0" fill="#818CF8"/><rect x="8" y="0" fill="#818CF8"/>
  <rect x="6" y="0" fill="#A5B4FC"/><rect x="9" y="0" fill="#A5B4FC"/>

  <!-- Head (angular, robot-like) -->
  <rect x="4" y="1" fill="#312E81"/><rect x="5" y="1" fill="#312E81"/><rect x="6" y="1" fill="#312E81"/><rect x="7" y="1" fill="#312E81"/><rect x="8" y="1" fill="#312E81"/><rect x="9" y="1" fill="#312E81"/><rect x="10" y="1" fill="#312E81"/><rect x="11" y="1" fill="#312E81"/>
  <rect x="4" y="2" fill="#312E81"/><rect x="5" y="2" fill="#312E81"/><rect x="6" y="2" fill="#312E81"/><rect x="7" y="2" fill="#312E81"/><rect x="8" y="2" fill="#312E81"/><rect x="9" y="2" fill="#312E81"/><rect x="10" y="2" fill="#312E81"/><rect x="11" y="2" fill="#312E81"/>
  <rect x="4" y="3" fill="#312E81"/><rect x="5" y="3" fill="#312E81"/><rect x="6" y="3" fill="#312E81"/><rect x="7" y="3" fill="#312E81"/><rect x="8" y="3" fill="#312E81"/><rect x="9" y="3" fill="#312E81"/><rect x="10" y="3" fill="#312E81"/><rect x="11" y="3" fill="#312E81"/>
  <rect x="4" y="4" fill="#312E81"/><rect x="5" y="4" fill="#312E81"/><rect x="6" y="4" fill="#312E81"/><rect x="7" y="4" fill="#312E81"/><rect x="8" y="4" fill="#312E81"/><rect x="9" y="4" fill="#312E81"/><rect x="10" y="4" fill="#312E81"/><rect x="11" y="4" fill="#312E81"/>

  <!-- Visor / screen eyes -->
  <rect x="5" y="2" fill="#818CF8"/><rect x="6" y="2" fill="#818CF8"/><rect x="7" y="2" fill="#818CF8"/><rect x="8" y="2" fill="#818CF8"/><rect x="9" y="2" fill="#818CF8"/><rect x="10" y="2" fill="#818CF8"/>
  <rect x="5" y="3" fill="#818CF8"/><rect x="6" y="3" fill="#818CF8"/><rect x="7" y="3" fill="#818CF8"/><rect x="8" y="3" fill="#818CF8"/><rect x="9" y="3" fill="#818CF8"/><rect x="10" y="3" fill="#818CF8"/>
  <!-- Digital eyes (bright squares) -->
  <rect x="5" y="2" fill="#FFFFFF"/><rect x="6" y="2" fill="#FFFFFF"/>
  <rect x="9" y="2" fill="#FFFFFF"/><rect x="10" y="2" fill="#FFFFFF"/>
  <rect x="5" y="3" fill="#FFFFFF"/><rect x="6" y="3" fill="#FFFFFF"/>
  <rect x="9" y="3" fill="#FFFFFF"/><rect x="10" y="3" fill="#FFFFFF"/>
  <!-- Pupils -->
  <rect x="6" y="3" fill="#312E81"/><rect x="9" y="3" fill="#312E81"/>

  <!-- LED mouth -->
  <rect x="6" y="4" fill="#A5B4FC"/><rect x="7" y="4" fill="#A5B4FC"/><rect x="8" y="4" fill="#A5B4FC"/><rect x="9" y="4" fill="#A5B4FC"/>

  <!-- Neck -->
  <rect x="7" y="5" fill="#4338CA"/><rect x="8" y="5" fill="#4338CA"/>

