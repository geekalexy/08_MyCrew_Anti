<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyCrew — Graphify Knowledge Hub</title>
  <!-- graph_data.js 존재 시 file:// 프로토콜에서도 동작 -->
  <script src="./graph_data.js" onerror="window.__GRAPH_DATA_LOAD_FAILED__=true"></script>
  <meta name="description" content="MyCrew 프로젝트 지식 그래프 시각화 허브">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0e1420;
      --surface2: #141b28;
      --border: rgba(99,132,255,0.15);
      --accent: #6384ff;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --text-muted: #8896b3;
      --node-doc: #3b82f6;
      --node-section: #06b6d4;
      --node-concept: #a78bfa;
      --node-code: #10b981;
      --node-module: #f59e0b;
      --panel-w: 340px;
    }

    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }

    /* ── Layout ── */
    #app { display: flex; height: 100vh; width: 100vw; position: relative; }
    #cy { flex: 1; height: 100%; }

    /* ── Loading overlay ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; z-index: 999; transition: opacity .6s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader-logo { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .loader-logo span { color: var(--accent); }
    .loader-bar-wrap { width: 260px; height: 3px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .loader-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .3s ease; }
    .loader-status { font-size: 13px; color: var(--text-muted); min-height: 20px; }

    /* ── Top bar ── */
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; height: 52px;
      background: rgba(8,12,20,0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; padding: 0 16px;
      z-index: 100;
    }
    .topbar-logo { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    .topbar-logo span { color: var(--accent); }
    .topbar-sep { width: 1px; height: 20px; background: var(--border); }
    .topbar-stat { font-size: 12px; color: var(--text-muted); }
    .topbar-stat b { color: var(--text); font-weight: 600; }
    .topbar-spacer { flex: 1; }

    /* search */
    #search-wrap { position: relative; }
    #search {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px 6px 32px;
      color: var(--text); font-size: 13px; width: 200px; outline: none;
      transition: border-color .2s, width .2s;
    }
    #search:focus { border-color: var(--accent); width: 260px; }
    #search::placeholder { color: var(--text-muted); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; pointer-events: none; }

    /* layout btn */
    #layout-btn, #fit-btn, #reset-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px; color: var(--text);
      font-size: 12px; font-family: inherit; cursor: pointer;
      transition: background .2s, border-color .2s;
    }
    #layout-btn:hover, #fit-btn:hover, #reset-btn:hover { background: var(--surface2); border-color: var(--accent); }

    /* ── Side panel ── */
    #panel {
      position: absolute; top: 52px; right: 0; bottom: 0;
      width: var(--panel-w); background: var(--surface);
      border-left: 1px solid var(--border);
      transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column; z-index: 90; overflow: hidden;
    }
    #panel.open { transform: translateX(0); }

    .panel-header {
      padding: 16px 18px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .panel-title { font-size: 14px; font-weight: 600; line-height: 1.4; word-break: break-word; }
    .panel-close {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 18px; padding: 2px; flex-shrink: 0;
      transition: color .2s;
    }
    .panel-close:hover { color: var(--text); }

    .panel-body { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 14px; }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .info-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .badge-document  { background: rgba(59,130,246,0.15); color: var(--node-doc); }
    .badge-section   { background: rgba(6,182,212,0.15); color: var(--node-section); }
    .badge-concept   { background: rgba(167,139,250,0.15); color: var(--node-concept); }
    .badge-code      { background: rgba(16,185,129,0.15); color: var(--node-code); }
    .badge-module    { background: rgba(245,158,11,0.15); color: var(--node-module); }

    .info-row { display: flex; flex-direction: column; gap: 4px; }
    .info-label { font-size: 11px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }
    .info-value { font-size: 13px; color: var(--text); word-break: break-all; }

    .neighbors-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
    .neighbor-item {
      padding: 8px 10px; background: var(--surface2); border-radius: 8px;
      font-size: 12px; cursor: pointer; border: 1px solid transparent;
      transition: border-color .2s, background .2s;
      display: flex; align-items: center; gap: 8px;
    }
    .neighbor-item:hover { border-color: var(--accent); background: rgba(99,132,255,0.06); }
    .neighbor-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Legend ── */
    #legend {
      position: absolute; bottom: 20px; left: 16px;
      background: rgba(14,20,32,0.82); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; display: flex; flex-direction: column; gap: 7px; z-index: 80;
    }
    .legend-title { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .6px; font-weight: 600; margin-bottom: 2px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

    /* ── Zoom controls ── */
    #zoom-ctrl {
      position: absolute; bottom: 20px; right: 16px;
      display: flex; flex-direction: column; gap: 6px; z-index: 80;
    }
    .zoom-btn {
      width: 36px; height: 36px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s;
    }
    .zoom-btn:hover { background: var(--surface2); border-color: var(--accent); }

    /* ── Toast ── */
    #toast {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 16px; font-size: 13px; color: var(--text-muted);
      opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div id="app">
  <!-- Loading -->
  <div id="loading">
    <div class="loader-logo">My<span>Crew</span> Graph</div>
    <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
    <div class="loader-status" id="loader-status">데이터 로딩 중…</div>
  </div>

  <!-- Top bar -->
  <div id="topbar">
    <div class="topbar-logo">My<span>Crew</span> <span style="font-weight:400;color:var(--text-muted)">Graphify</span></div>
    <div class="topbar-sep"></div>
    <div class="topbar-stat">노드 <b id="stat-nodes">—</b></div>
    <div class="topbar-stat">엣지 <b id="stat-edges">—</b></div>
    <div class="topbar-spacer"></div>
    <div id="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search" type="text" placeholder="노드 검색…" autocomplete="off">
    </div>
    <button id="fit-btn">⊞ 전체 보기</button>
    <button id="reset-btn">✕ 선택 해제</button>
    <button id="layout-btn">⟳ 레이아웃</button>
  </div>

  <!-- Graph canvas -->
  <div id="cy"></div>

  <!-- Side panel -->
  <div id="panel">
    <div class="panel-header">
      <div class="panel-title" id="panel-title">—</div>
      <button class="panel-close" id="panel-close">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

  <!-- Legend -->
  <div id="legend">
    <div class="legend-title">Node Types</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--node-doc)"></div>Document</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--node-section)"></div>Section</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--node-concept)"></div>Concept</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--node-code)"></div>Code</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--node-module)"></div>Module</div>
  </div>

  <!-- Zoom -->
  <div id="zoom-ctrl">
    <button class="zoom-btn" id="zoom-in">+</button>
    <button class="zoom-btn" id="zoom-out">−</button>
    <button class="zoom-btn" id="zoom-fit" title="화면 맞추기">⊡</button>
  </div>

  <!-- Toast -->
  <div id="toast" id="toast"></div>
</div>

<script>
(function () {
  'use strict';

  // ── DOM refs ──
  const loaderBar    = document.getElementById('loader-bar');
  const loaderStatus = document.getElementById('loader-status');
  const loadingEl    = document.getElementById('loading');
  const statNodes    = document.getElementById('stat-nodes');
  const statEdges    = document.getElementById('stat-edges');
  const panelEl      = document.getElementById('panel');
  const panelTitle   = document.getElementById('panel-title');
  const panelBody    = document.getElementById('panel-body');
  const panelClose   = document.getElementById('panel-close');
  const searchEl     = document.getElementById('search');
  const toastEl      = document.getElementById('toast');

  let cy = null;
  let toastTimer = null;

  // ── Color map ──
  const COLOR = {
    document : '#3b82f6',
    section  : '#06b6d4',
    concept  : '#a78bfa',
    code     : '#10b981',
    module   : '#f59e0b',
    default  : '#6384ff'
  };

  function nodeColor(type) { return COLOR[type] || COLOR.default; }

  // ── Toast ──
  function showToast(msg, ms = 2200) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
  }

  // ── Progress ──
  function setProgress(pct, status) {
    loaderBar.style.width = pct + '%';
    if (status) loaderStatus.textContent = status;
  }

  // ── Load & Init ──
  async function loadGraph() {
    // Strategy 1: window.__GRAPH_DATA__ (pre-loaded via <script src="graph_data.js">)
    // Works for both file:// and http:// protocols
    if (window.__GRAPH_DATA__) {
      setProgress(50, '로컬 데이터 감지됨…');
      await new Promise(r => setTimeout(r, 60));
      processData(window.__GRAPH_DATA__);
      return;
    }

    // Strategy 2: HTTP fetch (works when served via http/https)
    try {
      setProgress(10, 'graph.json 불러오는 중…');
      const res = await fetch('./graph.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      setProgress(40, 'JSON 파싱 중…');
      const data = await res.json();
      setProgress(65, '노드/엣지 처리 중…');
      await new Promise(r => setTimeout(r, 40));
      processData(data);
      return;
    } catch (fetchErr) {
      console.warn('[Graph] fetch() 실패:', fetchErr.message);
    }

    // Both failed
    loaderStatus.innerHTML = `❌ 데이터 로드 실패<br>
      <small style="color:var(--text-muted);font-size:11px;line-height:1.6">
        graph_data.js 또는 graph.json이 필요합니다<br>
        <b>방법 1:</b> graph_data.js 생성 후 같은 폴더에 저장<br>
        <b>방법 2:</b> HTTP 서버로 실행 (python3 -m http.server 8080)
      </small>`;
  }

  function processData(data) {
    let elements = [];
    
    // Support Graphify Python JSON format (nodes & links)
    if (data && data.nodes && data.links) {
      const cyNodes = data.nodes.map(n => ({ data: Object.assign({}, n, { type: n.file_type || 'default' }) }));
      const cyEdges = data.links.map(l => ({ data: Object.assign({}, l, { id: l.source + '-' + l.target }) }));
      elements = [...cyNodes, ...cyEdges];
    } else {
      elements = Array.isArray(data) ? data
        : (data && Array.isArray(data.elements)) ? data.elements
        : [];
    }

    const nodes = elements.filter(e => e.data && !e.data.source);
    const edges = elements.filter(e => e.data && e.data.source);

    statNodes.textContent = nodes.length.toLocaleString();
    statEdges.textContent = edges.length.toLocaleString();

    setProgress(75, 'Cytoscape 초기화 중…');
    setTimeout(() => initCytoscape(elements, nodes.length, edges.length), 40);
  }

  function initCytoscape(elements, nodeCount, edgeCount) {
    cy = cytoscape({
      container: document.getElementById('cy'),
      elements: elements,

      // ── Canvas performance options ──
      hideEdgesOnViewport    : true,   // viewport 이동 중 엣지 숨김 (핵심 최적화)
      hideLabelsOnViewport   : true,   // viewport 이동 중 라벨 숨김
      textureOnViewport      : true,   // 이동 중 texture 스냅샷 사용
      motionBlur             : false,
      motionBlurOpacity      : 0,
      pixelRatio             : 1,      // devicePixelRatio 고정 (고DPI 렌더 비용 절감)
      wheelSensitivity       : 0.3,
      minZoom                : 0.02,
      maxZoom                : 8,

      style: [
        {
          selector: 'node',
          style: {
            'shape'              : 'ellipse',
            'width'              : 'mapData(degree, 0, 20, 8, 32)',
            'height'             : 'mapData(degree, 0, 20, 8, 32)',
            'background-color'   : (ele) => nodeColor(ele.data('type')),
            'border-width'       : 1.5,
            'border-color'       : (ele) => nodeColor(ele.data('type')),
            'border-opacity'     : 0.4,
            'label'              : 'data(label)',
            'font-size'          : 9,
            'font-family'        : 'Inter, sans-serif',
            'color'              : '#c8d3f0',
            'text-valign'        : 'bottom',
            'text-halign'        : 'center',
            'text-margin-y'      : 3,
            'text-max-width'     : 80,
            'text-wrap'          : 'ellipsis',
            'text-overflow-wrap' : 'anywhere',
            'min-zoomed-font-size': 10,
            'transition-property': 'background-color, opacity',
            'transition-duration': '0.15s'
          }
        },
        {
          selector: 'edge',
          style: {
            'width'            : 0.8,
            'line-color'       : 'rgba(99,132,255,0.25)',
            'target-arrow-color': 'rgba(99,132,255,0.3)',
            'target-arrow-shape': 'none',
            'curve-style'      : 'haystack',
            'opacity'          : 0.5
          }
        },
        // Highlighted node
        {
          selector: 'node.highlighted',
          style: {
            'background-color'   : '#fff',
            'border-color'       : '#fff',
            'border-width'       : 3,
            'border-opacity'     : 1,
            'z-index'            : 999,
            'font-size'          : 11,
            'color'              : '#fff'
          }
        },
        // Neighbor node
        {
          selector: 'node.neighbor',
          style: {
            'opacity'      : 1,
            'border-width' : 2,
            'border-opacity': 0.8
          }
        },
        // Faded
        {
          selector: 'node.faded',
          style: { 'opacity': 0.08 }
        },
        {
          selector: 'edge.faded',
          style: { 'opacity': 0.04 }
        },
        // Edge highlighted
        {
          selector: 'edge.highlighted-edge',
          style: {
            'line-color'  : 'rgba(99,132,255,0.7)',
            'width'       : 2,
            'opacity'     : 0.9
          }
        },
        // Search match
        {
          selector: 'node.search-match',
          style: {
            'background-color' : '#fbbf24',
            'border-color'     : '#fbbf24',
            'border-width'     : 3,
            'border-opacity'   : 1,
            'z-index'          : 900
          }
        }
      ],

      layout: { name: 'grid', avoidOverlap: true, padding: 20 }
    });

    // Pre-compute degree for node sizing
    cy.nodes().forEach(n => {
      n.data('degree', n.degree(false));
    });

    // Re-apply style after degree is set
    cy.style().update();

    setProgress(90, '레이아웃 적용 중…');
    setTimeout(() => {
      cy.fit(undefined, 40);
      setProgress(100, '완료!');
      setTimeout(() => {
        loadingEl.classList.add('hidden');
        bindEvents();
        showToast(`🎉 ${nodeCount.toLocaleString()}개 노드 로드 완료`);
      }, 400);
    }, 100);
  }

  // ── Events ──
  function bindEvents() {
    // Node click → show panel
    cy.on('tap', 'node', function (evt) {
      selectNode(evt.target);
    });

    // Background tap → reset
    cy.on('tap', function (evt) {
      if (evt.target === cy) {
        resetHighlight();
        closePanel();
      }
    });

    // Panel close
    panelClose.addEventListener('click', () => {
      resetHighlight();
      closePanel();
    });

    // Fit
    document.getElementById('fit-btn').addEventListener('click', () => cy.fit(undefined, 40));
    document.getElementById('zoom-fit').addEventListener('click', () => cy.fit(undefined, 40));
    document.getElementById('zoom-in').addEventListener('click', () => cy.zoom(cy.zoom() * 1.3));
    document.getElementById('zoom-out').addEventListener('click', () => cy.zoom(cy.zoom() * 0.77));

    // Reset
    document.getElementById('reset-btn').addEventListener('click', () => {
      resetHighlight();
      closePanel();
    });

    // Layout
    document.getElementById('layout-btn').addEventListener('click', runLayout);

    // Search
    let searchDebounce;
    searchEl.addEventListener('input', () => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(doSearch, 280);
    });
    searchEl.addEventListener('keydown', e => {
      if (e.key === 'Escape') { searchEl.value = ''; doSearch(); }
    });
  }

  function selectNode(node) {
    resetHighlight();
    const neighbors = node.neighborhood();
    const neighborNodes = neighbors.nodes();
    const neighborEdges = neighbors.edges();

    cy.elements().addClass('faded');
    node.removeClass('faded').addClass('highlighted');
    neighborNodes.removeClass('faded').addClass('neighbor');
    neighborEdges.removeClass('faded').addClass('highlighted-edge');

    openPanel(node, neighborNodes);
  }

  function resetHighlight() {
    if (!cy) return;
    cy.elements().removeClass('faded highlighted neighbor highlighted-edge search-match');
  }

  function closePanel() {
    panelEl.classList.remove('open');
  }

  function openPanel(node, neighbors) {
    const d = node.data();
    const type = d.type || 'default';

    panelTitle.textContent = d.label || d.id;

    const badgeClass = 'badge-' + type;

    let neighborsHTML = '';
    if (neighbors.length > 0) {
      const items = neighbors.map(n => {
        const nd = n.data();
        const c = nodeColor(nd.type);
        return `<div class="neighbor-item" data-id="${escHtml(nd.id)}">
          <span class="neighbor-dot" style="background:${c}"></span>
          <span>${escHtml(nd.label || nd.id)}</span>
        </div>`;
      }).join('');
      neighborsHTML = `
        <div class="info-row">
          <div class="info-label">연결된 노드 (${neighbors.length})</div>
          <div class="neighbors-list">${items}</div>
        </div>`;
    }

    panelBody.innerHTML = `
      <div><span class="info-badge ${badgeClass}">${escHtml(type)}</span></div>
      <div class="info-row">
        <div class="info-label">Label</div>
        <div class="info-value">${escHtml(d.label || '—')}</div>
      </div>
      <div class="info-row">
        <div class="info-label">ID</div>
        <div class="info-value" style="font-size:11px;color:var(--text-muted)">${escHtml(d.id)}</div>
      </div>
      <div class="info-row">
        <div class="info-label">연결 수 (Degree)</div>
        <div class="info-value">${node.degree(false)}</div>
      </div>
      ${neighborsHTML}
    `;

    // Neighbor click → jump to that node
    panelBody.querySelectorAll('.neighbor-item').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.dataset.id;
        const target = cy.getElementById(id);
        if (target.length) {
          cy.animate({ center: { eles: target }, zoom: Math.max(cy.zoom(), 1.5) }, { duration: 400 });
          selectNode(target);
        }
      });
    });

    panelEl.classList.add('open');
  }

  function doSearch() {
    const q = searchEl.value.trim().toLowerCase();
    cy.elements().removeClass('search-match faded');
    if (!q) return;

    const matched = cy.nodes().filter(n => {
      const label = (n.data('label') || '').toLowerCase();
      const id    = (n.data('id') || '').toLowerCase();
      return label.includes(q) || id.includes(q);
    });

    if (matched.length === 0) {
      showToast('검색 결과 없음');
      return;
    }

    cy.elements().addClass('faded');
    matched.removeClass('faded').addClass('search-match');
    matched.connectedEdges().removeClass('faded');

    if (matched.length <= 30) {
      cy.animate({ fit: { eles: matched, padding: 60 } }, { duration: 500 });
    }
    showToast(`${matched.length}개 노드 검색됨`);
  }

  let layoutRunning = false;
  function runLayout() {
    if (layoutRunning) { showToast('레이아웃 실행 중…'); return; }
    const count = cy ? cy.nodes().length : 0;
    if (count > 3000) {
      showToast('⚠️ 대규모 데이터: concentric 레이아웃 적용 중…', 3000);
      layoutRunning = true;
      cy.layout({
        name: 'concentric',
        concentric: n => n.degree(false),
        levelWidth: () => 5,
        minNodeSpacing: 12,
        padding: 30,
        animate: false
      }).run();
      setTimeout(() => { layoutRunning = false; cy.fit(undefined, 40); }, 500);
    } else {
      showToast('cose 레이아웃 적용 중…', 2000);
      layoutRunning = true;
      cy.layout({
        name: 'cose',
        animate: false,
        nodeRepulsion: () => 6000,
        idealEdgeLength: () => 60,
        edgeElasticity: () => 100,
        gravity: 0.25,
        numIter: 1000,
        padding: 30
      }).run();
      setTimeout(() => { layoutRunning = false; cy.fit(undefined, 40); }, 800);
    }
  }

  function escHtml(s) {
    return String(s || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Start ──
  loadGraph();
})();
</script>
</body>
</html>
