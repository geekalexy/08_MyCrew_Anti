<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="luca-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="luca-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="96" fill="url(#luca-bg)" stroke="#C7D2FE" stroke-width="2"/>
  <!-- Head (angular, professional) -->
  <rect x="64" y="50" width="72" height="56" rx="16" fill="url(#luca-body)"/>
  <!-- Visor / screen -->
  <rect x="72" y="62" width="56" height="24" rx="6" fill="#818CF8"/>
  <!-- Eyes (digital) -->
  <rect x="80" y="68" width="12" height="12" rx="2" fill="#fff"/>
  <rect x="108" y="68" width="12" height="12" rx="2" fill="#fff"/>
  <rect x="83" y="71" width="6" height="6" rx="1" fill="#312E81"/>
  <rect x="111" y="71" width="6" height="6" rx="1" fill="#312E81"/>
  <!-- Mouth (LED indicator) -->
  <rect x="90" y="94" width="20" height="3" rx="1.5" fill="#A5B4FC"/>
  <!-- Antenna -->
  <line x1="100" y1="50" x2="100" y2="36" stroke="#4338CA" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="94" y="32" width="12" height="6" rx="3" fill="#818CF8"/>
  <!-- Body -->
  <path d="M62 120 Q62 108 78 108 L122 108 Q138 108 138 120 L138 170 Q138 178 130 178 L70 178 Q62 178 62 170 Z" fill="url(#luca-body)"/>
  <!-- Chest panel -->
  <rect x="82" y="122" width="36" height="28" rx="4" fill="#818CF8" opacity="0.4"/>
  <rect x="88" y="128" width="8" height="3" rx="1.5" fill="#A5B4FC"/>
  <rect x="88" y="134" width="14" height="3" rx="1.5" fill="#A5B4FC"/>
  <rect x="88" y="140" width="10" height="3" rx="1.5" fill="#A5B4FC"/>
  <!-- Label -->
  <text x="100" y="196" text-anchor="middle" fill="#4338CA" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600">Luca</text>
</svg>
