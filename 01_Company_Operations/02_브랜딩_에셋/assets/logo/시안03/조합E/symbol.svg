<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="sgE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Clip to hexagon compound shape only (no square background) -->
    <clipPath id="hexClip">
      <!-- Central hexagon -->
      <polygon points="60,30 78,42 78,66 60,78 42,66 42,42"/>
      <!-- Top-left hex -->
      <polygon points="38,28 48,22 58,28 58,40 48,46 38,40"/>
      <!-- Top-right hex -->
      <polygon points="62,28 72,22 82,28 82,40 72,46 62,40"/>
      <!-- Bottom hex -->
      <polygon points="50,68 60,62 70,68 70,80 60,86 50,80"/>
      <!-- Center circle area -->
      <circle cx="60" cy="54" r="12"/>
    </clipPath>
  </defs>
  <!-- Blue gradient background, clipped to hexagon shapes only -->
  <rect x="0" y="0" width="120" height="120" fill="url(#sgE)" clip-path="url(#hexClip)"/>
  <!-- Original white elements on top (identical to 시안03) -->
  <!-- Central hexagon stroke + semi-transparent fill -->
  <polygon points="60,30 78,42 78,66 60,78 42,66 42,42" fill="rgba(255,255,255,0.15)" stroke="#fff" stroke-width="2.5"/>
  <!-- Top-left hex -->
  <polygon points="38,28 48,22 58,28 58,40 48,46 38,40" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <!-- Top-right hex -->
  <polygon points="62,28 72,22 82,28 82,40 72,46 62,40" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <!-- Bottom hex -->
  <polygon points="50,68 60,62 70,68 70,80 60,86 50,80" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <!-- AI core dot in center -->
  <circle cx="60" cy="54" r="6" fill="#fff"/>
  <!-- Pulse ring -->
  <circle cx="60" cy="54" r="12" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
</svg>
