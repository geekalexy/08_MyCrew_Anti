<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="256" height="256" shape-rendering="crispEdges">
  <style>
    rect { width: 1px; height: 1px; }
  </style>
  <!-- Background -->
  <rect x="0" y="0" width="16" height="16" fill="#FEF3C7"/>

  <!-- Ear tufts -->
  <rect x="4" y="1" fill="#92400E"/><rect x="11" y="1" fill="#92400E"/>
  <rect x="4" y="2" fill="#92400E"/><rect x="5" y="2" fill="#92400E"/>
  <rect x="10" y="2" fill="#92400E"/><rect x="11" y="2" fill="#92400E"/>

  <!-- Head (round owl) -->
  <rect x="5" y="2" fill="#D97706"/><rect x="6" y="2" fill="#D97706"/><rect x="7" y="2" fill="#D97706"/><rect x="8" y="2" fill="#D97706"/><rect x="9" y="2" fill="#D97706"/><rect x="10" y="2" fill="#D97706"/>
  <rect x="4" y="3" fill="#D97706"/><rect x="5" y="3" fill="#D97706"/><rect x="6" y="3" fill="#D97706"/><rect x="7" y="3" fill="#D97706"/><rect x="8" y="3" fill="#D97706"/><rect x="9" y="3" fill="#D97706"/><rect x="10" y="3" fill="#D97706"/><rect x="11" y="3" fill="#D97706"/>
  <rect x="4" y="4" fill="#D97706"/><rect x="5" y="4" fill="#D97706"/><rect x="6" y="4" fill="#D97706"/><rect x="7" y="4" fill="#D97706"/><rect x="8" y="4" fill="#D97706"/><rect x="9" y="4" fill="#D97706"/><rect x="10" y="4" fill="#D97706"/><rect x="11" y="4" fill="#D97706"/>
  <rect x="4" y="5" fill="#D97706"/><rect x="5" y="5" fill="#D97706"/><rect x="6" y="5" fill="#D97706"/><rect x="7" y="5" fill="#D97706"/><rect x="8" y="5" fill="#D97706"/><rect x="9" y="5" fill="#D97706"/><rect x="10" y="5" fill="#D97706"/><rect x="11" y="5" fill="#D97706"/>

  <!-- Big owl eyes (white circles with pupils) -->
  <rect x="5" y="3" fill="#FFFFFF"/><rect x="6" y="3" fill="#FFFFFF"/>
  <rect x="5" y="4" fill="#FFFFFF"/><rect x="6" y="4" fill="#FFFFFF"/>
  <rect x="9" y="3" fill="#FFFFFF"/><rect x="10" y="3" fill="#FFFFFF"/>
  <rect x="9" y="4" fill="#FFFFFF"/><rect x="10" y="4" fill="#FFFFFF"/>
  <!-- Pupils -->
  <rect x="6" y="4" fill="#92400E"/>
  <rect x="9" y="4" fill="#92400E"/>

  <!-- Beak -->
  <rect x="7" y="5" fill="#F59E0B"/><rect x="8" y="5" fill="#F59E0B"/>

  <!-- Belly (cream) -->
  <rect x="5" y="6" fill="#FDE68A"/><rect x="6" y="6" fill="#FDE68A"/><rect x="7" y="6" fill="#FDE68A"/><rect x="8" y="6" fill="#FDE68A"/><rect x="9" y="6" fill="#FDE68A"/><rect x="10" y="6" fill="#FDE68A"/>

  <!-- Body -->
  <rect x="4" y="6" fill="#D97706"/><rect x="11" y="6" fill="#D97706"/>
  <rect x="4" y="7" fill="#D97706"/><rect x="5" y="7" fill="#FDE68A"/><rect x="6" y="7" fill="#FDE68A"/><rect x="7" y="7" fill="#FDE68A"/><rect x="8" y="7" fill="#FDE68A"/><rect x="9" y="7" fill="#FDE68A"/><rect x="10" y="7" fill="#FDE68A"/><rect x="11" y="7" fill="#D97706"/>
  <rect x="3" y="8" fill="#D97706"/><rect x="4" y="8" fill="#D97706"/><rect x="5" y="8" fill="#FDE68A"/><rect x="6" y="8" fill="#FDE68A"/><rect x="7" y="8" fill="#FDE68A"/><rect x="8" y="8" fill="#FDE68A"/><rect x="9" y="8" fill="#FDE68A"/><rect x="10" y="8" fill="#FDE68A"/><rect x="11" y="8" fill="#D97706"/><rect x="12" y="8" fill="#D97706"/>
  <rect x="3" y="9" fill="#D97706"/><rect x="4" y="9" fill="#D97706"/><rect x="5" y="9" fill="#FDE68A"/><rect x="6" y="9" fill="#FDE68A"/><rect x="7" y="9" fill="#FDE68A"/><rect x="8" y="9" fill="#FDE68A"/><rect x="9" y="9" fill="#FDE68A"/><rect x="10" y="9" fill="#FDE68A"/><rect x="11" y="9" fill="#D97706"/><rect x="12" y="9" fill="#D97706"/>
  <rect x="4" y="10" fill="#D97706"/><rect x="5" y="10" fill="#FDE68A"/><rect x="6" y="10" fill="#FDE68A"/><rect x="7" y="10" fill="#FDE68A"/><rect x="8" y="10" fill="#FDE68A"/><rect x="9" y="10" fill="#FDE68A"/><rect x="10" y="10" fill="#FDE68A"/><rect x="11" y="10" fill="#D97706"/>

  <!-- Wings -->
  <rect x="2" y="7" fill="#92400E"/><rect x="3" y="7" fill="#92400E"/>
  <rect x="12" y="7" fill="#92400E"/><rect x="13" y="7" fill="#92400E"/>
  <rect x="2" y="8" fill="#92400E"/>
  <rect x="13" y="8" fill="#92400E"/>

  <!-- Feet -->
  <rect x="5" y="11" fill="#F59E0B"/><rect x="6" y="11" fill="#F59E0B"/><rect x="7" y="11" fill="#F59E0B"/>
  <rect x="8" y="11" fill="#F59E0B"/><rect x="9" y="11" fill="#F59E0B"/><rect x="10" y="11" fill="#F59E0B"/>

  <!-- Label -->
  <text x="8" y="15.5" text-anchor="middle" fill="#D97706" font-family="monospace" font-size="1.2" font-weight="bold">Ollie</text>
</svg>
