  <rect x="3" y="7" fill="#4338CA"/><rect x="4" y="7" fill="#4338CA"/><rect x="5" y="7" fill="#4338CA"/><rect x="6" y="7" fill="#4338CA"/><rect x="7" y="7" fill="#4338CA"/><rect x="8" y="7" fill="#4338CA"/><rect x="9" y="7" fill="#4338CA"/><rect x="10" y="7" fill="#4338CA"/><rect x="11" y="7" fill="#4338CA"/><rect x="12" y="7" fill="#4338CA"/>
  <rect x="3" y="8" fill="#4338CA"/><rect x="4" y="8" fill="#4338CA"/><rect x="5" y="8" fill="#4338CA"/><rect x="6" y="8" fill="#4338CA"/><rect x="7" y="8" fill="#4338CA"/><rect x="8" y="8" fill="#4338CA"/><rect x="9" y="8" fill="#4338CA"/><rect x="10" y="8" fill="#4338CA"/><rect x="11" y="8" fill="#4338CA"/><rect x="12" y="8" fill="#4338CA"/>
  <rect x="4" y="9" fill="#4338CA"/><rect x="5" y="9" fill="#4338CA"/><rect x="6" y="9" fill="#4338CA"/><rect x="7" y="9" fill="#4338CA"/><rect x="8" y="9" fill="#4338CA"/><rect x="9" y="9" fill="#4338CA"/><rect x="10" y="9" fill="#4338CA"/><rect x="11" y="9" fill="#4338CA"/>

  <!-- Chest panel -->
  <rect x="6" y="7" fill="#818CF8"/><rect x="7" y="7" fill="#818CF8"/><rect x="8" y="7" fill="#818CF8"/><rect x="9" y="7" fill="#818CF8"/>
  <rect x="6" y="8" fill="#A5B4FC"/><rect x="7" y="8" fill="#818CF8"/><rect x="8" y="8" fill="#A5B4FC"/><rect x="9" y="8" fill="#818CF8"/>

  <!-- Arms (mechanical) -->
  <rect x="2" y="6" fill="#312E81"/><rect x="2" y="7" fill="#312E81"/><rect x="2" y="8" fill="#818CF8"/>
  <rect x="13" y="6" fill="#312E81"/><rect x="13" y="7" fill="#312E81"/><rect x="13" y="8" fill="#818CF8"/>

  <!-- Legs -->
  <rect x="5" y="10" fill="#312E81"/><rect x="6" y="10" fill="#312E81"/>
  <rect x="9" y="10" fill="#312E81"/><rect x="10" y="10" fill="#312E81"/>
  <rect x="5" y="11" fill="#312E81"/><rect x="6" y="11" fill="#312E81"/>
  <rect x="9" y="11" fill="#312E81"/><rect x="10" y="11" fill="#312E81"/>

