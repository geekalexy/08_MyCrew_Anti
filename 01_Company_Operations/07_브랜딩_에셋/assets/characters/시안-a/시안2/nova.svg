<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="256" height="256" shape-rendering="crispEdges">
  <style>
    rect { width: 1px; height: 1px; }
  </style>
  <!-- Background -->
  <rect x="0" y="0" width="16" height="16" fill="#EDE9FE"/>

  <!-- Star sparkles in background -->
  <rect x="2" y="1" fill="#DDD6FE"/><rect x="13" y="2" fill="#DDD6FE"/><rect x="1" y="5" fill="#DDD6FE"/><rect x="14" y="6" fill="#DDD6FE"/>

  <!-- Crown star -->
  <rect x="7" y="0" fill="#FBBF24"/><rect x="8" y="0" fill="#FBBF24"/>
  <rect x="6" y="1" fill="#FBBF24"/><rect x="7" y="1" fill="#FDE68A"/><rect x="8" y="1" fill="#FDE68A"/><rect x="9" y="1" fill="#FBBF24"/>

  <!-- Head -->
  <rect x="5" y="2" fill="#7C3AED"/><rect x="6" y="2" fill="#7C3AED"/><rect x="7" y="2" fill="#7C3AED"/><rect x="8" y="2" fill="#7C3AED"/><rect x="9" y="2" fill="#7C3AED"/><rect x="10" y="2" fill="#7C3AED"/>
  <rect x="4" y="3" fill="#7C3AED"/><rect x="5" y="3" fill="#7C3AED"/><rect x="6" y="3" fill="#7C3AED"/><rect x="7" y="3" fill="#7C3AED"/><rect x="8" y="3" fill="#7C3AED"/><rect x="9" y="3" fill="#7C3AED"/><rect x="10" y="3" fill="#7C3AED"/><rect x="11" y="3" fill="#7C3AED"/>
  <rect x="4" y="4" fill="#7C3AED"/><rect x="5" y="4" fill="#7C3AED"/><rect x="6" y="4" fill="#7C3AED"/><rect x="7" y="4" fill="#7C3AED"/><rect x="8" y="4" fill="#7C3AED"/><rect x="9" y="4" fill="#7C3AED"/><rect x="10" y="4" fill="#7C3AED"/><rect x="11" y="4" fill="#7C3AED"/>
  <rect x="5" y="5" fill="#7C3AED"/><rect x="6" y="5" fill="#7C3AED"/><rect x="7" y="5" fill="#7C3AED"/><rect x="8" y="5" fill="#7C3AED"/><rect x="9" y="5" fill="#7C3AED"/><rect x="10" y="5" fill="#7C3AED"/>

  <!-- Eyes -->
  <rect x="5" y="3" fill="#FFFFFF"/><rect x="6" y="3" fill="#FFFFFF"/>
  <rect x="9" y="3" fill="#FFFFFF"/><rect x="10" y="3" fill="#FFFFFF"/>
  <rect x="5" y="4" fill="#FFFFFF"/><rect x="6" y="4" fill="#FFFFFF"/>
  <rect x="9" y="4" fill="#FFFFFF"/><rect x="10" y="4" fill="#FFFFFF"/>
  <!-- Pupils -->
  <rect x="6" y="4" fill="#4C1D95"/><rect x="9" y="4" fill="#4C1D95"/>

  <!-- Smile -->
  <rect x="6" y="5" fill="#DDD6FE"/><rect x="7" y="5" fill="#DDD6FE"/><rect x="8" y="5" fill="#DDD6FE"/><rect x="9" y="5" fill="#DDD6FE"/>

  <!-- Body (violet cape/suit) -->
  <rect x="3" y="6" fill="#8B5CF6"/><rect x="4" y="6" fill="#7C3AED"/><rect x="5" y="6" fill="#7C3AED"/><rect x="6" y="6" fill="#7C3AED"/><rect x="7" y="6" fill="#7C3AED"/><rect x="8" y="6" fill="#7C3AED"/><rect x="9" y="6" fill="#7C3AED"/><rect x="10" y="6" fill="#7C3AED"/><rect x="11" y="6" fill="#7C3AED"/><rect x="12" y="6" fill="#8B5CF6"/>
  <rect x="3" y="7" fill="#8B5CF6"/><rect x="4" y="7" fill="#7C3AED"/><rect x="5" y="7" fill="#7C3AED"/><rect x="6" y="7" fill="#7C3AED"/><rect x="7" y="7" fill="#7C3AED"/><rect x="8" y="7" fill="#7C3AED"/><rect x="9" y="7" fill="#7C3AED"/><rect x="10" y="7" fill="#7C3AED"/><rect x="11" y="7" fill="#7C3AED"/><rect x="12" y="7" fill="#8B5CF6"/>
  <rect x="3" y="8" fill="#8B5CF6"/><rect x="4" y="8" fill="#7C3AED"/><rect x="5" y="8" fill="#7C3AED"/><rect x="6" y="8" fill="#7C3AED"/><rect x="7" y="8" fill="#7C3AED"/><rect x="8" y="8" fill="#7C3AED"/><rect x="9" y="8" fill="#7C3AED"/><rect x="10" y="8" fill="#7C3AED"/><rect x="11" y="8" fill="#7C3AED"/><rect x="12" y="8" fill="#8B5CF6"/>
  <rect x="4" y="9" fill="#7C3AED"/><rect x="5" y="9" fill="#7C3AED"/><rect x="6" y="9" fill="#7C3AED"/><rect x="7" y="9" fill="#7C3AED"/><rect x="8" y="9" fill="#7C3AED"/><rect x="9" y="9" fill="#7C3AED"/><rect x="10" y="9" fill="#7C3AED"/><rect x="11" y="9" fill="#7C3AED"/>

  <!-- Star badge on chest -->
  <rect x="7" y="7" fill="#FBBF24"/><rect x="8" y="7" fill="#FBBF24"/>
  <rect x="6" y="8" fill="#FBBF24"/><rect x="7" y="8" fill="#FDE68A"/><rect x="8" y="8" fill="#FDE68A"/><rect x="9" y="8" fill="#FBBF24"/>

  <!-- Cape edges -->
  <rect x="2" y="7" fill="#6D28D9"/><rect x="2" y="8" fill="#6D28D9"/><rect x="2" y="9" fill="#6D28D9"/>
  <rect x="13" y="7" fill="#6D28D9"/><rect x="13" y="8" fill="#6D28D9"/><rect x="13" y="9" fill="#6D28D9"/>

  <!-- Legs -->
  <rect x="5" y="10" fill="#4C1D95"/><rect x="6" y="10" fill="#4C1D95"/>
  <rect x="9" y="10" fill="#4C1D95"/><rect x="10" y="10" fill="#4C1D95"/>
  <rect x="5" y="11" fill="#4C1D95"/><rect x="6" y="11" fill="#4C1D95"/>
  <rect x="9" y="11" fill="#4C1D95"/><rect x="10" y="11" fill="#4C1D95"/>

  <!-- Shoes -->
  <rect x="4" y="12" fill="#2E1065"/><rect x="5" y="12" fill="#2E1065"/><rect x="6" y="12" fill="#2E1065"/>
  <rect x="9" y="12" fill="#2E1065"/><rect x="10" y="12" fill="#2E1065"/><rect x="11" y="12" fill="#2E1065"/>

  <!-- Label -->
  <text x="8" y="15.5" text-anchor="middle" fill="#7C3AED" font-family="monospace" font-size="1.2" font-weight="bold">Nova</text>
</svg>
