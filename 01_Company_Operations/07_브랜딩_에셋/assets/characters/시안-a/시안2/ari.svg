<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="256" height="256" shape-rendering="crispEdges">
  <style>
    rect { width: 1px; height: 1px; }
  </style>
  <!-- Background -->
  <rect x="0" y="0" width="16" height="16" fill="#DBEAFE"/>

  <!-- Hair (dark blue) -->
  <rect x="5" y="1" fill="#1E40AF"/><rect x="6" y="1" fill="#1E40AF"/><rect x="7" y="1" fill="#1E40AF"/><rect x="8" y="1" fill="#1E40AF"/><rect x="9" y="1" fill="#1E40AF"/><rect x="10" y="1" fill="#1E40AF"/>
  <rect x="4" y="2" fill="#1E40AF"/><rect x="5" y="2" fill="#1E40AF"/><rect x="6" y="2" fill="#1E40AF"/><rect x="7" y="2" fill="#1E40AF"/><rect x="8" y="2" fill="#1E40AF"/><rect x="9" y="2" fill="#1E40AF"/><rect x="10" y="2" fill="#1E40AF"/><rect x="11" y="2" fill="#1E40AF"/>

  <!-- Antenna -->
  <rect x="7" y="0" fill="#FBBF24"/><rect x="8" y="0" fill="#FBBF24"/>

  <!-- Face (light) -->
  <rect x="4" y="3" fill="#FDE68A"/><rect x="5" y="3" fill="#FDE68A"/><rect x="6" y="3" fill="#FDE68A"/><rect x="7" y="3" fill="#FDE68A"/><rect x="8" y="3" fill="#FDE68A"/><rect x="9" y="3" fill="#FDE68A"/><rect x="10" y="3" fill="#FDE68A"/><rect x="11" y="3" fill="#FDE68A"/>
  <rect x="4" y="4" fill="#FDE68A"/><rect x="5" y="4" fill="#FDE68A"/><rect x="6" y="4" fill="#FDE68A"/><rect x="7" y="4" fill="#FDE68A"/><rect x="8" y="4" fill="#FDE68A"/><rect x="9" y="4" fill="#FDE68A"/><rect x="10" y="4" fill="#FDE68A"/><rect x="11" y="4" fill="#FDE68A"/>
  <rect x="4" y="5" fill="#FDE68A"/><rect x="5" y="5" fill="#FDE68A"/><rect x="6" y="5" fill="#FDE68A"/><rect x="7" y="5" fill="#FDE68A"/><rect x="8" y="5" fill="#FDE68A"/><rect x="9" y="5" fill="#FDE68A"/><rect x="10" y="5" fill="#FDE68A"/><rect x="11" y="5" fill="#FDE68A"/>
  <rect x="5" y="6" fill="#FDE68A"/><rect x="6" y="6" fill="#FDE68A"/><rect x="7" y="6" fill="#FDE68A"/><rect x="8" y="6" fill="#FDE68A"/><rect x="9" y="6" fill="#FDE68A"/><rect x="10" y="6" fill="#FDE68A"/>

  <!-- Eyes -->
  <rect x="5" y="4" fill="#1E3A5F"/><rect x="6" y="4" fill="#1E3A5F"/>
  <rect x="9" y="4" fill="#1E3A5F"/><rect x="10" y="4" fill="#1E3A5F"/>

  <!-- Smile -->
  <rect x="6" y="5" fill="#D97706"/><rect x="7" y="5" fill="#D97706"/><rect x="8" y="5" fill="#D97706"/><rect x="9" y="5" fill="#D97706"/>

  <!-- Body (blue uniform) -->
  <rect x="4" y="7" fill="#2563EB"/><rect x="5" y="7" fill="#2563EB"/><rect x="6" y="7" fill="#2563EB"/><rect x="7" y="7" fill="#2563EB"/><rect x="8" y="7" fill="#2563EB"/><rect x="9" y="7" fill="#2563EB"/><rect x="10" y="7" fill="#2563EB"/><rect x="11" y="7" fill="#2563EB"/>
  <rect x="3" y="8" fill="#2563EB"/><rect x="4" y="8" fill="#2563EB"/><rect x="5" y="8" fill="#2563EB"/><rect x="6" y="8" fill="#2563EB"/><rect x="7" y="8" fill="#2563EB"/><rect x="8" y="8" fill="#2563EB"/><rect x="9" y="8" fill="#2563EB"/><rect x="10" y="8" fill="#2563EB"/><rect x="11" y="8" fill="#2563EB"/><rect x="12" y="8" fill="#2563EB"/>
  <rect x="3" y="9" fill="#2563EB"/><rect x="4" y="9" fill="#2563EB"/><rect x="5" y="9" fill="#2563EB"/><rect x="6" y="9" fill="#2563EB"/><rect x="7" y="9" fill="#2563EB"/><rect x="8" y="9" fill="#2563EB"/><rect x="9" y="9" fill="#2563EB"/><rect x="10" y="9" fill="#2563EB"/><rect x="11" y="9" fill="#2563EB"/><rect x="12" y="9" fill="#2563EB"/>
  <rect x="3" y="10" fill="#2563EB"/><rect x="4" y="10" fill="#2563EB"/><rect x="5" y="10" fill="#2563EB"/><rect x="6" y="10" fill="#2563EB"/><rect x="7" y="10" fill="#2563EB"/><rect x="8" y="10" fill="#2563EB"/><rect x="9" y="10" fill="#2563EB"/><rect x="10" y="10" fill="#2563EB"/><rect x="11" y="10" fill="#2563EB"/><rect x="12" y="10" fill="#2563EB"/>

  <!-- Badge "A" on chest -->
  <rect x="7" y="8" fill="#FFFFFF"/><rect x="8" y="8" fill="#FFFFFF"/>
  <rect x="7" y="9" fill="#FFFFFF"/><rect x="8" y="9" fill="#FFFFFF"/>

  <!-- Arms -->
  <rect x="2" y="8" fill="#FDE68A"/><rect x="2" y="9" fill="#FDE68A"/>
  <rect x="13" y="8" fill="#FDE68A"/><rect x="13" y="9" fill="#FDE68A"/>

  <!-- Legs -->
  <rect x="5" y="11" fill="#1E40AF"/><rect x="6" y="11" fill="#1E40AF"/>
  <rect x="9" y="11" fill="#1E40AF"/><rect x="10" y="11" fill="#1E40AF"/>
  <rect x="5" y="12" fill="#1E40AF"/><rect x="6" y="12" fill="#1E40AF"/>
  <rect x="9" y="12" fill="#1E40AF"/><rect x="10" y="12" fill="#1E40AF"/>

  <!-- Shoes -->
  <rect x="4" y="13" fill="#111827"/><rect x="5" y="13" fill="#111827"/><rect x="6" y="13" fill="#111827"/>
  <rect x="9" y="13" fill="#111827"/><rect x="10" y="13" fill="#111827"/><rect x="11" y="13" fill="#111827"/>

  <!-- Label -->
  <text x="8" y="15.5" text-anchor="middle" fill="#2563EB" font-family="monospace" font-size="1.2" font-weight="bold">Ari</text>
</svg>
