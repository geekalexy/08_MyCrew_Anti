  </defs>
  <style>
    .wmE { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; font-size: 48px; letter-spacing: -2px; font-style: italic; }
  </style>
  <!-- Blue gradient clipped to hex shapes -->
  <rect x="0" y="0" width="120" height="120" fill="url(#sgEc)" clip-path="url(#hexClipC)"/>
  <!-- Original white elements (identical to 시안03) -->
