  <circle cx="82" cy="52" r="10" fill="none" stroke="#fff" stroke-width="3"/>
  <circle cx="60" cy="78" r="10" fill="none" stroke="#fff" stroke-width="3"/>
  <!-- Connection lines -->
  <line x1="46" y1="58" x2="52" y2="72" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="74" y1="58" x2="68" y2="72" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="48" y1="52" x2="72" y2="52" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
