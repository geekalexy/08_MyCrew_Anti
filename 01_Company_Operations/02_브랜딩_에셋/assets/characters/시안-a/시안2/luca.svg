  <rect x="4" y="12" fill="#1E1B4B"/><rect x="5" y="12" fill="#1E1B4B"/><rect x="6" y="12" fill="#1E1B4B"/>
  <rect x="9" y="12" fill="#1E1B4B"/><rect x="10" y="12" fill="#1E1B4B"/><rect x="11" y="12" fill="#1E1B4B"/>

  <!-- Label -->
  <text x="8" y="15.5" text-anchor="middle" fill="#4338CA" font-family="monospace" font-size="1.2" font-weight="bold">Luca</text>
</svg>
