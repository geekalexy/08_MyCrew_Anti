<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MyCrew — Google 로그인 처리 중...</title>
  <style>
    body { background: #0a0a0f; color: #fff; font-family: sans-serif;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .msg { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #4f8ef7;
               border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <p>Google 인증 처리 중...</p>
  </div>
  <script>
    // URL 쿼리 파라미터에서 Authorization Code 추출 (Offline Access)
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');

    if (code) {
      // 부모 창으로 Code 및 리다이렉트 URI 전달
      window.opener?.postMessage(
        { googleOAuthCode: { code, redirectUri: window.location.origin + '/oauth-callback' } },
        window.location.origin
      );
      document.querySelector('p').textContent = '✅ 인증 완료! 서버와 교환 중입니다...';
      setTimeout(() => window.close(), 1500);
    } else {
      document.querySelector('p').textContent = '❌ 인증 실패. 코드를 찾을 수 없습니다.';
      setTimeout(() => window.close(), 2000);
    }
  </script>
</body>
</html>
