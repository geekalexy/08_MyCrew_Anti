<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MyCrew — Google 로그인 처리 중...</title>
  <style>
    body { background: #0a0a0f; color: #fff; font-family: sans-serif;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .msg { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #4f8ef7;
               border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <p>Google 인증 처리 중...</p>
  </div>
  <script>
    // URL 해시에서 OAuth implicit flow 토큰 추출
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const token = params.get('access_token');
    const expiresIn = parseInt(params.get('expires_in') || '3600', 10);

    if (token) {
      // 부모 창으로 토큰 전달
      window.opener?.postMessage(
        { googleOAuthToken: { token, expiresIn } },
        window.location.origin
      );
      document.querySelector('p').textContent = '✅ 인증 완료! 창이 닫힙니다...';
      setTimeout(() => window.close(), 800);
    } else {
      document.querySelector('p').textContent = '❌ 인증 실패. 다시 시도해 주세요.';
      setTimeout(() => window.close(), 2000);
    }
  </script>
</body>
</html>
